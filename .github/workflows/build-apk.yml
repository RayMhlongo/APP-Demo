name: Build Demo APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npm run cap:add:android
          fi

      - name: Sync Capacitor
        run: npm run cap:sync

      - name: Ensure camera permission in Android manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          if "android.permission.CAMERA" not in text:
              insert = '\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n'
              text = text.replace("</manifest>", insert + "</manifest>")
              manifest.write_text(text, encoding="utf-8")
          PY

      - name: Install Python imaging dependency
        run: python -m pip install pillow

      - name: Apply Cathdel branded launcher icon
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          src = Image.open("icons/icon-512x512.png").convert("RGBA")
          res = Path("android/app/src/main/res")
          targets = {"mipmap-mdpi":48,"mipmap-hdpi":72,"mipmap-xhdpi":96,"mipmap-xxhdpi":144,"mipmap-xxxhdpi":192}
          for folder, size in targets.items():
              out = res / folder
              out.mkdir(parents=True, exist_ok=True)
              icon = src.resize((size, size), Image.Resampling.LANCZOS)
              for name in ("ic_launcher.png", "ic_launcher_round.png", "ic_launcher_foreground.png"):
                  icon.save(out / name)
          PY

      - name: Ensure debug keystore for release signing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -dname "CN=Cathdel Creamy,O=Cathdel,C=ZA" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Resolve and sign release APK
        run: |
          SIGNED_APK="android/app/build/outputs/apk/release/app-release.apk"
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$SIGNED_APK" ]; then
            echo "APK_FILE=$SIGNED_APK" >> $GITHUB_ENV
            exit 0
          fi

          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "No release APK output found." >&2
            exit 1
          fi

          APKSIGNER_BIN="$(command -v apksigner || true)"
          if [ -z "$APKSIGNER_BIN" ]; then
            APKSIGNER_BIN="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          fi

          "$APKSIGNER_BIN" sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

          "$APKSIGNER_BIN" verify "$SIGNED_APK"
          echo "APK_FILE=$SIGNED_APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cathdel-creamy-release-apk
          path: ${{ env.APK_FILE }}
          if-no-files-found: error

      - name: Create Release with APK
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APK_FILE }}
          tag_name: cathdel-v${{ github.run_number }}
          release_name: Cathdel Creamy APK v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
